<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Battle 6</title>
    <style>
        body{
            background: #0692CF;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        p{
            width: 20px;
            height: 100px;
            background: #060F55;
            position: absolute;
            left: 190px;
            top: 150px;
            border-radius: 70px;
            position: absolute;
            

        }
        p::before{
            content: "";
            position: absolute;
            width: 140px;
            height: 140px;
            background: #060F55;
            border-radius: 70px 70px 40px 40px;
            left: -60px;
            top: -70px;
        }
        p::after{
            content: "";
            position: absolute;
            width: 20px;
            height: 80px;
            background:#060F55;
            left: -40px;
            top: -100px;
            box-shadow: 40px 0 #060F55,80px 0 #060F55;
        }
    </style>
</head>
<body>
    <p></p>
</body>
</html>
