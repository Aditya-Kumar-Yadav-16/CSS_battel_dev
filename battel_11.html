<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS_battel_dev</title>
    <style>
        body{
    margin:0;
    display:grid;
    place-items:center;
    background:#222;
    height:100vh;
}

.flower{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#EA8228;
    box-shadow:
      0 -60px #EA8228,
      0 60px #EA8228,
      60px 0 #EA8228,
      -60px 0 #EA8228;
}
    </style>
</head>
<body>
    <div class="flower"></div>
</body>
</html>
