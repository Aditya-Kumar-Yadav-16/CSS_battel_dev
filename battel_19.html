<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    height:100vh;
}

.netflix{
    width:160px;
    height:260px;
    position:relative;
}

.netflix::before{
    content:"";
    position:absolute;
    left:0;
    width:40px;
    height:100%;
    background:#E50914;
}

.netflix::after{
    content:"";
    position:absolute;
    right:0;
    width:40px;
    height:100%;
    background:#B00610;
}

.netflix{
    background:linear-gradient(
        72deg,
        transparent 35%,
        #E50914 35%,
        #E50914 65%,
        transparent 65%
    );
}
    </style>

</head>
<body>
    <div class="netflix"></div>
</body>
</html>
