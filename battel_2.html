<html lang="en">
<head>

    <title>CSS battel dev-2</title>
    <style>
        body{
            background:#62374E;
            margin:0;
            padding:100px;
        }
        div{
            width:50px;

            background:#FDC57B;
        }
        .one,.two{
            display: inline-block;
        }

            position: relative;
            left:200px;
        }
        .three{

            left:255px;
            top: 50px;
        }
        
    </style>
</head>
<body>
    <div class="one"></div>
    <div class="two"></div>
    <div class="three"></div>
    <div class="four"></div>
</body>
