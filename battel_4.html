<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS battel 4</title>
    <style>
        body{
            background: #0B2429;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        p{
            margin-top: 100px;
            width: 100px;
            height: 100px;
            background: #F3AC3C;
            border-radius: 50% 0 50% 50%;
            position: absolute;
            
        }
        .middle{
            background: #998235;
            transform: translate(110px, 70px);
        }

        .first{
           transform: translate(60px,120px); 
        }
        .last{
            transform: translate(160px,40px);
        }

        /* just remove the transform property -ve sign from x axis */
    </style>
</head>
<body>
    <p class="first"></p>
    <p class="middle"></p>
    <p class="last"></p>
</body>
</html>
