<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS_battel_dev</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:grid;
    place-items:center;
    height:100vh;
    background:#111;
}

.batman{
    width:340px;
    height:180px;
    background:#FFD500;
    clip-path:polygon(
        0% 55%,
        6% 42%,
        12% 44%,
        18% 28%,
        25% 8%,
        34% 28%,
        42% 45%,
        48% 10%,
        50% 0,
        52% 10%,
        58% 45%,
        66% 28%,
        75% 8%,
        82% 28%,
        88% 44%,
        94% 42%,
        100% 55%,
        90% 70%,
        82% 72%,
        74% 82%,
        63% 100%,
        50% 86%,
        37% 100%,
        26% 82%,
        18% 72%,
        10% 70%
    );
}
    </style>
</head>
<body>
    <div class="batman"></div>
</body>
</html>
