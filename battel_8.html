<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>battel_8</title>
    <style>
        body {
            margin: 0;
            display: grid;
            place-items: center;
            height: 100vh;
            background: #222730;
        }

        .circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: #4CAAB3;
            box-shadow:
                0 0 0 40px #393E46,
                0 0 0 60px #4CAAB3;
        }
    </style>
</head>

<body>
    <div class="circle"></div>
</body>
