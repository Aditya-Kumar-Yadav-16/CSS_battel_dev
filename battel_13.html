<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS_battel_dev</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:grid;
    place-items:center;
    height:100vh;
    background:#fff;
}

.rings{
    width:420px;
    height:180px;
    background:
        radial-gradient(circle,#0000 32px,#0085C7 34px,#0085C7 40px,#0000 42px) 0 0/140px 90px,
        radial-gradient(circle,#0000 32px,#000 34px,#000 40px,#0000 42px) 140px 0/140px 90px,
        radial-gradient(circle,#0000 32px,#DF0024 34px,#DF0024 40px,#0000 42px) 280px 0/140px 90px,
        radial-gradient(circle,#0000 32px,#F4C300 34px,#F4C300 40px,#0000 42px) 70px 70px/140px 90px,
        radial-gradient(circle,#0000 32px,#009F3D 34px,#009F3D 40px,#0000 42px) 210px 70px/140px 90px;
    background-repeat:no-repeat;
}
    </style>
</head>
<body>
    <div class="rings"></div>
</body>
</html>
