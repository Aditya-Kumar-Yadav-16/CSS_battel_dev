<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS battel-7</title>
    <style>
        body{
            background: #393E46;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;

        }
        .rec{
            margin-top: 200px;
            width: 600px;
            height: 100px;
            background: #4caab3;

            
        }
        .sqr-1{
            width: 200px;
            height: 200px;
            background: #4caab3;
            left: 150px;
            
            
        }
        .sqr-2{
            width: 100px;
            height: 100px;
            background: #1a2829;
            left: 300px;
        }
        .circle{
            width: 100px;
            height: 100px;
            background: #4caab3;
            border-radius: 50%;
        }

    </style>
</head>
<body>
    <p class="rec"></p>
    <p class="sqr-1"></p>
    <p class="sqr-2"></p>
    <p class="circle"></p>
</body>
</html>
